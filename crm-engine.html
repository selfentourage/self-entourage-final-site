<!doctype html><html lang="en"><head><meta charset="utf-8"><meta name="viewport" content="width=device-width, initial-scale=1"><title>CRM Engine – Self Entourage</title><meta name="robots" content="noindex"><link rel="stylesheet" href="style.css"><link rel="stylesheet" href="crm-engine.css"></head><body><main class="se-crm-shell"><div class="se-crm-wrap"><div class="se-crm-head"><div><span class="se-crm-badge">Pipeline Layer</span><h1>Live CRM Engine</h1><p>Track leads, assign status, review payloads, and move opportunities through a real pipeline.</p></div><div class="se-crm-actions"><a class="dark" href="owner-control-center.html">Owner Center</a><button id="importBtn">Import Latest Intake</button></div></div><div class="se-crm-grid"><section class="se-crm-card"><h2>Lead Pipeline</h2><table class="se-crm-table"><thead><tr><th>Name</th><th>Need</th><th>Status</th><th>Value</th><th>Action</th></tr></thead><tbody id="crmRows"></tbody></table></section><aside class="se-crm-card"><h2>Lead Detail</h2><div class="se-crm-detail"><pre id="crmDetail">Select or import a lead.</pre></div><div class="se-crm-actions"><button class="primary" id="markWon">Mark Won</button><button id="markReview">Needs Review</button><button id="copyLead">Copy</button></div><div class="se-crm-stat"><strong id="statLeads">0</strong><span>Total Leads</span></div><div class="se-crm-stat"><strong id="statHot">0</strong><span>Hot Leads</span></div><div class="se-crm-stat"><strong id="statWon">0</strong><span>Won</span></div></aside></div></div></main><script>(function(){var KEY='se_crm_leads';function load(){try{return JSON.parse(localStorage.getItem(KEY)||'[]')}catch(e){return []}}function save(v){localStorage.setItem(KEY,JSON.stringify(v))}function latest(){try{return JSON.parse(localStorage.getItem('se_ai_intake')||'null')}catch(e){return null}}var leads=load(),selected=0;function score(l){var v=100;if(l.budget==='$2k+')v=2500;else if(l.budget==='$500-$2k')v=900;else if(l.budget==='$100-$500')v=250; if(l.time==='Today / ASAP')v*=1.4; return Math.round(v);}function statusClass(s){return s==='Hot'?'hot':s==='Won'?'ready':'';}function render(){var rows=document.getElementById('crmRows');rows.innerHTML='';leads.forEach(function(l,i){var tr=document.createElement('tr');tr.innerHTML='<td>'+(l.name||('Lead '+(i+1)))+'</td><td>'+l.need+'</td><td><span class="se-crm-pill '+statusClass(l.status)+'">'+l.status+'</span></td><td>$'+score(l)+'</td><td><button data-i="'+i+'">Open</button></td>';rows.appendChild(tr);});rows.querySelectorAll('button').forEach(function(b){b.onclick=function(){selected=parseInt(this.dataset.i,10);detail();};});document.getElementById('statLeads').textContent=leads.length;document.getElementById('statHot').textContent=leads.filter(x=>x.status==='Hot').length;document.getElementById('statWon').textContent=leads.filter(x=>x.status==='Won').length;detail();}function detail(){var el=document.getElementById('crmDetail');if(!leads.length){el.textContent='No leads yet.';return;}el.textContent=JSON.stringify(leads[selected]||leads[0],null,2);}document.getElementById('importBtn').onclick=function(){var l=latest();if(!l)return alert('No latest intake found.');l.status=l.budget==='$2k+'||l.time==='Today / ASAP'?'Hot':'Open';l.name=l.name||'Lead '+(leads.length+1);leads.unshift(l);save(leads);selected=0;render();};document.getElementById('markWon').onclick=function(){if(!leads.length)return;leads[selected].status='Won';save(leads);render();};document.getElementById('markReview').onclick=function(){if(!leads.length)return;leads[selected].status='Review';save(leads);render();};document.getElementById('copyLead').onclick=function(){navigator.clipboard&&navigator.clipboard.writeText(document.getElementById('crmDetail').textContent);this.textContent='Copied';};render();})();</script></body></html>
