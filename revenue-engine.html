<!doctype html><html lang="en"><head><meta charset="utf-8"><meta name="viewport" content="width=device-width, initial-scale=1"><title>Revenue Engine – Self Entourage</title><meta name="robots" content="noindex"><link rel="stylesheet" href="style.css"><link rel="stylesheet" href="revenue-engine.css"></head><body><main class="se-rev-shell"><div class="se-rev-wrap"><div class="se-rev-head"><div><span class="se-rev-badge">Money Layer</span><h1>Revenue Engine</h1><p>Create proposals, track won deals, estimate pipeline value, and operate the cash side of the machine.</p></div><div class="se-rev-actions"><a class="dark" href="crm-engine.html">CRM</a></div></div><section class="se-rev-grid"><div class="se-rev-stat"><strong id="mrr">$0</strong><span>Projected MRR</span></div><div class="se-rev-stat"><strong id="pipe">$0</strong><span>Pipeline Value</span></div><div class="se-rev-stat"><strong id="won">0</strong><span>Won Deals</span></div><div class="se-rev-stat"><strong id="close">0%</strong><span>Close Rate</span></div></section><section class="se-rev-main"><section class="se-rev-card"><h2>Deals</h2><table class="se-rev-table"><thead><tr><th>Lead</th><th>Status</th><th>Value</th><th>Action</th></tr></thead><tbody id="dealRows"></tbody></table></section><aside class="se-rev-card"><h2>Proposal Builder</h2><div class="se-rev-field"><label>Client Name</label><input id="clientName"></div><div class="se-rev-field"><label>Offer</label><input id="offerName" value="Custom Build Path"></div><div class="se-rev-field"><label>Price</label><input id="priceVal" value="1500"></div><div class="se-rev-field"><label>Term</label><select id="termVal"><option>One-Time</option><option>Monthly</option></select></div><div class="se-rev-actions"><button class="primary" id="genBtn">Generate Proposal</button><button id="copyBtn">Copy</button></div><div class="se-rev-proposal" id="proposalBox">Proposal output will appear here.</div></aside></section></div></main><script>(function(){function crm(){try{return JSON.parse(localStorage.getItem('se_crm_leads')||'[]')}catch(e){return []}}var leads=crm();function val(l){var v=100;if(l.budget==='$2k+')v=2500;else if(l.budget==='$500-$2k')v=900;else if(l.budget==='$100-$500')v=250;if(l.status==='Won')v*=1;return Math.round(v);}function render(){var rows=document.getElementById('dealRows');rows.innerHTML='';var pipe=0,won=0,wonCount=0;leads.forEach(function(l,i){var v=val(l);pipe+=v;if(l.status==='Won'){won+=v;wonCount++;}var tr=document.createElement('tr');tr.innerHTML='<td>'+(l.name||('Lead '+(i+1)))+'</td><td><span class="se-rev-pill '+(l.status==='Won'?'won':'open')+'">'+l.status+'</span></td><td>$'+v+'</td><td><button data-i="'+i+'">Win</button></td>';rows.appendChild(tr);});rows.querySelectorAll('button').forEach(function(b){b.onclick=function(){var i=parseInt(this.dataset.i,10);leads[i].status='Won';localStorage.setItem('se_crm_leads',JSON.stringify(leads));render();};});document.getElementById('pipe').textContent='$'+pipe;document.getElementById('won').textContent=wonCount;document.getElementById('mrr').textContent='$'+Math.round(won*0.3);document.getElementById('close').textContent=(leads.length?Math.round((wonCount/leads.length)*100):0)+'%';}render();document.getElementById('genBtn').onclick=function(){var n=document.getElementById('clientName').value||'Client';var o=document.getElementById('offerName').value;var p=document.getElementById('priceVal').value;var t=document.getElementById('termVal').value;document.getElementById('proposalBox').textContent='Proposal for '+n+'\n\nOffer: '+o+'\nInvestment: $'+p+'\nTerm: '+t+'\n\nIncludes:\n- Strategy and implementation path\n- Defined next steps\n- Direct communication route\n\nTo begin: confirm acceptance and submit payment.';};document.getElementById('copyBtn').onclick=function(){navigator.clipboard&&navigator.clipboard.writeText(document.getElementById('proposalBox').textContent);this.textContent='Copied';};})();</script></body></html>
